# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Jake Kara
css_file: jk2026.css
socialImage: /assets/images/og/JakeKaraSocial_og.png
twitterImage: /assets/images/twitter/JakeKaraSocial_square.png
email: hey@jakekara.com
description: > # this means to ignore newlines until "baseurl:"
  Jake Kara's home on the Web.
url: "https://jakekara.com" # the base hostname & protocol for your site
baseurl: "/" # the subpath of your site, e.g. /blog
twitter_username: jakekara
github_username: jakekara

# Build settings
markdown: kramdown
exclude: ["old", "vendor"]
include: [".well-known"]

#permalink: /:categories/:year/:month/:day/:title:output_ext

plugins:
  - jekyll-archives
  - jekyll-redirect-from

jekyll-archives:
  enabled: all
  layout: archive
  permalinks:
    year: "/:year/"
    month: "/:year/:month/"
    day: "/:year/:month/:day/"
    tag: "/tag/:name/"
    category: "/category/:name/"
    collection: ":collection/"
    collectionYear: ":collection/:year"

collections:
  projects:
    output: true
  notes:
    output: true
  food:
    output: true
    permalink: /:collection/:title
  blog:
    sort_by: date
    output: true
    permalink: /:collection/:year/:month/:day/:title

permalink: /:categories/:year/:month/:day/:title
post_dirs: true

defaults:
  - scope:
      path: "" # empty string for all files
      type: blog
    values:
      is_post: true
      ogtype: "article"
